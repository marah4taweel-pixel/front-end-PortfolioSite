           <section class="hero">
            <h2>Contact</h2>
           </section>
         </header>

         <section class="form-section">
            <form method="get">
                <h2>Send us a message</h2>
                <div>
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" minlength="3" maxlength="20" placeholder="e.g. john smith" required>
                </div>
                <div>
                    <label for="email" >Email</label>
                    <input id="email" name="email" type="text" placeholder="e.g. name@domain.tld" required>
                </div>
                <div>
                    <label for="message">Message</label>
                    <input id="message" name="message" type="text" placeholder="Enter your message" required>
                </div>
                
                    <button>Submit</button>
            </form>
         </section>

         <section class="contact">
              <h2>Contact details</h2>
              <div>
                 <p><span class="contact-label">Email:</span> <strong>contact@Izihiman.com</strong></p>

                 <p><span class="contact-label">Address:</span> <em>palestine in ramallah</em></p>
                 <p><span class="contact-label">Street:</span> <em>alrsal street</em></p>
              </div>
        </section>
