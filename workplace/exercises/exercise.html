<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Implementing HTML Elements</title>
</head>

<body>
  <h1>My Awesome Page</h1>

      <h2>Text Elements</h2>

      <h3>Paragraph</h3>
      <p>
        hi hi
      </p>

      <h4>Ordered List</h4>
      <ol>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
        <li>Fourth Item</li>
      </ol>

      <h4>Unordered List</h4>
      <ul>
        <li>A Bullet Point</li>
        <li>A Bullet Point</li>
        <li>A Bullet Point</li>
        <li>A Bullet Point</li>
        <li>A Bullet Point</li>
      </ul>

      <h2>Other Elements</h2>

      <h3>Link</h3>
      <a href="#" >Go to this page</a>

      <h3>Image</h3>
      <img src="./closeup-cat-sleeping-51874508.webp" alt="A closeup of a sleeping cat." width="100">


</body>

</html>
