<!DOCTYPE html>
<html lang="en">    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta meta name="description" content="This is the description of my webpage.">
        <title>My Webpage Template</title>
        <link rel="stylesheet" href="stylesheet11.css">

    </head>
    <body>
       <div class="profile-card profile-card--highlighted">
                   <img class="profile-card__avatar" src="avatar.jpg" alt="User Avatar">
                   <h2 class="profile-card__name profile-card__name--bold">Jane Doe</h2>
                   <p class="profile-card__bio  profile-card__bio--italic">Front-end Developer with a passion for clean UI.</p>
                   <button class="profile-card__button profile-card__button--primary">Follow</button>
                   <button class="profile-card__button profile-card__button--secondary">Message</button>
        </div>
        <article class="media">
  <img src="profile.jpg" alt="User profile" class="media__image">
  <div class="media__content">
    <h3 class="media__title">Jane Doe</h3>
    <p class="media__text">This is an example of a comment or description text.</p>
  </div>
</article>
    </body>
</html>
